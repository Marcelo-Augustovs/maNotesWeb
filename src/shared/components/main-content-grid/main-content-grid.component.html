<div class="main-content-grid">

  <div class="table-area glass-panel">

    <div class="table-header">
      <div class="header-left">
        <mat-icon>insights</mat-icon>
        <h3>Histórico do mês</h3>
      </div>

      <mat-form-field appearance="outline" class="search-field">
        <mat-icon matPrefix>search</mat-icon>
        <input matInput placeholder="Buscar..." [(ngModel)]="searchTerm" (ngModelChange)="onSearchChange()">
      </mat-form-field>
    </div>

    <!-- EMPTY STATE -->
    <div *ngIf="filteredTransactions.length === 0" class="empty-state">
      <mat-icon>search_off</mat-icon>
      <p>Nenhuma transação encontrada</p>
    </div>

    <!-- TABELA -->
    <div class="table-responsive" *ngIf="filteredTransactions.length > 0">

      <table mat-table [dataSource]="paginatedTransactions" class="modern-mat-table">

        <!-- Descrição -->
        <ng-container matColumnDef="descricao">
          <th mat-header-cell *matHeaderCellDef> Descrição </th>
          <td mat-cell *matCellDef="let t"> {{ t.descricao }} </td>
        </ng-container>

        <!-- Valor -->
        <ng-container matColumnDef="valor">
          <th mat-header-cell *matHeaderCellDef> Valor </th>
          <td mat-cell *matCellDef="let t">
            <span [ngClass]="t.tipo === 'Receita' ? 'text-success' : 'text-danger'">
              {{ t.valor }}
            </span>
          </td>
        </ng-container>

        <!-- Data -->
        <ng-container matColumnDef="data">
          <th mat-header-cell *matHeaderCellDef> Data </th>
          <td mat-cell *matCellDef="let t"> {{ t.data }} </td>
        </ng-container>

        <!-- Categoria -->
        <ng-container matColumnDef="categoria">
          <th mat-header-cell *matHeaderCellDef> Categoria </th>
          <td mat-cell *matCellDef="let t"> {{ t.categoria }} </td>
        </ng-container>

        <!-- Tipo -->
        <ng-container matColumnDef="tipo">
          <th mat-header-cell *matHeaderCellDef> Tipo </th>
          <td mat-cell *matCellDef="let t">
            <mat-chip [color]="t.tipo === 'Receita' ? 'primary' : 'warn'" selected>
              {{ t.tipo }}
            </mat-chip>
          </td>
        </ng-container>

        <!-- Pagamento -->
        <ng-container matColumnDef="pagamento">
          <th mat-header-cell *matHeaderCellDef> Pagamento </th>
          <td mat-cell *matCellDef="let t"> {{ t.pagamento }} </td>
        </ng-container>

        <!-- Ações -->
        <ng-container matColumnDef="acoes">
          <th mat-header-cell *matHeaderCellDef class="text-right"> Ações </th>
          <td mat-cell *matCellDef="let t" class="text-right">
            <button mat-icon-button color="warn" (click)="deleteTransaction(t, $event)" title="Excluir">
              <mat-icon>delete</mat-icon>
            </button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;" (click)="editTransaction(row)"
          class="clickable-row">
        </tr>

      </table>

    </div>

    <mat-paginator class="glass-panel" [length]="filteredTransactions.length" [pageSize]="pageSize"
      [pageSizeOptions]="[5, 10, 25, 50]" (page)="handlePageEvent($event)">
    </mat-paginator>

  </div>

  <div class="chart-container glass-panel">
    <canvas id="financeChart"></canvas>
  </div>

</div>
