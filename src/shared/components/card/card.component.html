<mat-card [ngClass]="['finance-card', 'glass-panel', color]">
    <mat-card-header>
        <mat-icon mat-card-avatar class="card-icon">{{icon}}</mat-icon>
        <mat-card-title>{{title}}</mat-card-title>
    </mat-card-header>
    <mat-card-content>
        <h2 class="card-value">{{valor}}</h2>
    </mat-card-content>
</mat-card>
