<div class="notes-container">

  <div class="header-actions">
    <h2>Minhas Anotações</h2>
    <div class="actions-group">
      <button mat-stroked-button color="accent" (click)="createTable()">
        <mat-icon>table_chart</mat-icon> Nova Tabela
      </button>
    </div>
  </div>

  <!-- Area de Notas usando o Componente Compartilhado -->
  <app-notes-post-its 
    [notes]="notes" 
    (saveNoteEvent)="onSaveNote($event)" 
    (deleteNoteEvent)="onDeleteNote($event)">
  </app-notes-post-its>

  <mat-divider></mat-divider>

  <!-- Area das Tabelas Recuperadas -->
  <div class="tables-area">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
      <h3>Tabelas Dinâmicas</h3>
    </div>

    <div class="tables-grid" *ngIf="!selectedTable">
      <mat-card *ngFor="let table of tables" class="table-card glass-panel">
        <mat-card-header>
          <mat-icon mat-card-avatar>grid_on</mat-icon>
          <mat-card-title>{{ table.title }}</mat-card-title>
        </mat-card-header>
        <mat-card-actions align="end">
          <button mat-icon-button color="primary" (click)="openTable(table)"><mat-icon>open_in_new</mat-icon></button>
          <button mat-icon-button color="warn" (click)="deleteTable(table.id)"><mat-icon>delete</mat-icon></button>
        </mat-card-actions>
      </mat-card>
    </div>

    <!-- Tabela Aberta -->
    <app-dynamic-table *ngIf="selectedTable" [table]="selectedTable" (tableChange)="onTableChange($event)"
      (close)="closeTable()">
    </app-dynamic-table>

  </div>

</div>
